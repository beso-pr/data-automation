# Multi-API ETL pipeline configuration.

input:
  sales_csv: data/sales_sample.csv

# Currency to normalise all revenue to.
base_currency: USD

# Cities to fetch weather for. Coordinates resolved via Open-Meteo geocoding.
# (resolved coordinates are cached on disk between runs)
cities:
  - { name: Berlin,    country: DE }
  - { name: Paris,     country: FR }
  - { name: London,    country: GB }
  - { name: Tokyo,     country: JP }
  - { name: New York,  country: US }
  - { name: Sao Paulo, country: BR }

# APIs (free, no key required).
apis:
  fx:
    base_url: https://api.frankfurter.app
    timeout_seconds: 15
  weather_geocode:
    base_url: https://geocoding-api.open-meteo.com/v1/search
    timeout_seconds: 15
  weather_archive:
    base_url: https://archive-api.open-meteo.com/v1/archive
    timeout_seconds: 30
  # Optional fallback for the trailing ~5 days that the archive doesn't cover yet.
  # Comment this out to disable the fallback.
  weather_forecast:
    base_url: https://api.open-meteo.com/v1/forecast
    timeout_seconds: 30

# Weather behaviour.
weather:
  archive_lag_days: 5      # archive endpoint trails today by ~5 days
  fallback_to_forecast: true

# Resilience knobs for HTTP calls.
http:
  max_retries: 4
  backoff_seconds: 1.5
  # Per-host circuit breaker: open after N consecutive failures, cool down for M sec.
  circuit_breaker_threshold: 5
  circuit_breaker_reset_seconds: 60

cache:
  enabled: true
  directory: .cache
  ttl_hours: 24

logging:
  file_path: output/etl.log   # set to null to disable file logging
  max_bytes: 5242880          # 5 MiB
  backup_count: 5

output:
  directory: output
  sqlite_path: output/etl.sqlite
  html_path: output/report.html
